# Netlify 构建配置
# 仓库：xwenr/personal-resume，子目录部署 velorah/

[build]
  base = "velorah"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"

# SPA fallback —— 让深链接 / 刷新都返回 index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 静态资源缓存（Vite 产物含哈希，可放心长缓存）
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
