<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>竞赛成果 · Xin Yongchun</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --font-display: 'Instrument Serif', 'Noto Serif SC',
          'Cormorant Garamond', 'Source Han Serif SC', 'PingFang SC',
          'Songti SC', serif;
        --font-body: 'Geist', 'Inter', 'Noto Sans SC', 'PingFang SC',
          'Microsoft YaHei', system-ui, sans-serif;
        --bg: #f5f2e9;
        --fg: #3a2e2a;
        --muted-fg: #8c7d73;
        --border: rgba(58, 46, 42, 0.14);
        --border-soft: rgba(58, 46, 42, 0.08);
        --card: rgba(245, 242, 233, 0.55);
        --card-strong: rgba(245, 242, 233, 0.72);
        color-scheme: light;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font-body);
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      html,
      body,
      * {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar,
      *::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .font-display {
        font-family: var(--font-display);
        font-feature-settings: 'ss01', 'ss02';
      }
      .page {
        min-height: 100%;
        display: flex;
        flex-direction: column;
      }
      /* --- Top bar --- */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        background: rgba(245, 242, 233, 0.7);
        border-bottom: 1px solid var(--border-soft);
      }
      .topbar-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .brand {
        font-family: var(--font-display);
        font-size: 20px;
        letter-spacing: -0.02em;
      }
      .brand em {
        font-style: italic;
        color: var(--muted-fg);
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--muted-fg);
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid var(--border-soft);
        transition: background 0.3s ease, color 0.3s ease,
          border-color 0.3s ease;
      }
      .back-link:hover {
        color: var(--fg);
        background: rgba(58, 46, 42, 0.04);
        border-color: var(--border);
      }
      .back-link svg {
        width: 14px;
        height: 14px;
      }
      /* --- Header --- */
      .header {
        max-width: 1200px;
        margin: 0 auto;
        padding: 36px 24px 18px;
        width: 100%;
      }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.25em;
        font-size: 11px;
        color: var(--muted-fg);
        margin-bottom: 14px;
      }
      .title {
        font-family: var(--font-display);
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin: 0 0 10px;
      }
      .rank {
        display: inline-block;
        font-size: 13px;
        color: var(--muted-fg);
        padding: 4px 12px;
        border-radius: 999px;
        border: 1px solid var(--border-soft);
        margin-bottom: 14px;
      }
      .description {
        max-width: 820px;
        font-size: 14px;
        line-height: 1.75;
        color: var(--muted-fg);
      }
      /* --- Toolbar (file switcher + actions) --- */
      .toolbar {
        max-width: 1200px;
        margin: 18px auto 0;
        padding: 0 24px;
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }
      .switcher {
        display: inline-flex;
        padding: 4px;
        border-radius: 999px;
        background: var(--card);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-soft);
      }
      .switcher button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--muted-fg);
        font: inherit;
        font-size: 13px;
        padding: 8px 16px;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.3s ease, color 0.3s ease;
      }
      .switcher button:hover {
        color: var(--fg);
      }
      .switcher button.active {
        background: var(--fg);
        color: var(--bg);
      }
      .actions {
        margin-left: auto;
        display: inline-flex;
        gap: 8px;
      }
      .action-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid var(--border-soft);
        color: var(--muted-fg);
        cursor: pointer;
        transition: background 0.3s ease, color 0.3s ease,
          border-color 0.3s ease;
        background: var(--card);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .action-btn:hover {
        color: var(--fg);
        border-color: var(--border);
      }
      .action-btn svg {
        width: 14px;
        height: 14px;
      }
      /* --- Viewer --- */
      .viewer {
        flex: 1;
        max-width: 1200px;
        width: 100%;
        margin: 20px auto 36px;
        padding: 0 24px;
        min-height: 0;
      }
      .viewer-frame {
        width: 100%;
        height: calc(100vh - 280px);
        min-height: 520px;
        border-radius: 20px;
        border: 1px solid var(--border-soft);
        background: var(--card-strong);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        overflow: hidden;
        box-shadow: 0 12px 40px rgba(58, 46, 42, 0.06);
      }
      .viewer-frame iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      .file-caption {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted-fg);
        letter-spacing: 0.04em;
      }
      /* --- Error state --- */
      .error {
        max-width: 640px;
        margin: 80px auto;
        padding: 36px;
        text-align: center;
        border-radius: 20px;
        border: 1px solid var(--border-soft);
        background: var(--card-strong);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .error h2 {
        font-family: var(--font-display);
        font-size: 26px;
        margin: 0 0 8px;
      }
      .error p {
        color: var(--muted-fg);
        font-size: 14px;
        line-height: 1.7;
      }
      @media (max-width: 720px) {
        .topbar-inner,
        .header,
        .toolbar,
        .viewer {
          padding-left: 18px;
          padding-right: 18px;
        }
        .viewer-frame {
          height: calc(100vh - 340px);
          min-height: 420px;
        }
        .actions {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="topbar-inner">
          <a class="brand" href="/">Xin Yongchun <em>· 作品</em></a>
          <a class="back-link" href="/#profile" aria-label="返回个人主页">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            <span>返回主页</span>
          </a>
        </div>
      </header>

      <section class="header" id="header-section" hidden>
        <div class="eyebrow" id="eyebrow">竞赛成果</div>
        <h1 class="title" id="title"></h1>
        <div class="rank" id="rank" hidden></div>
        <p class="description" id="description"></p>
      </section>

      <div class="toolbar" id="toolbar" hidden>
        <div class="switcher" id="switcher" role="tablist" aria-label="文件版本切换"></div>
        <div class="actions">
          <a class="action-btn" id="open-new" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>
            新窗口打开
          </a>
          <a class="action-btn" id="download" download>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v12"/><path d="M6 10l6 6 6-6"/><path d="M4 20h16"/></svg>
            下载
          </a>
        </div>
      </div>

      <main class="viewer" id="viewer" hidden>
        <div class="viewer-frame">
          <iframe id="pdf-frame" title="PDF 预览"></iframe>
        </div>
        <p class="file-caption" id="file-caption"></p>
      </main>

      <section class="error" id="error" hidden>
        <h2>未找到对应的成果</h2>
        <p>链接中的 <code id="error-id"></code> 参数没有匹配到任何条目。请返回主页重新进入，或联系作者确认。</p>
      </section>
    </div>

    <script>
      /**
       * Award 数据：key = URL 中的 ?id=xxx
       * files 顺序决定切换按钮顺序，默认展示第一个文件。
       * label 是切换按钮上的文字；name 是下方小字的文件名说明。
       */
      const AWARDS = {
        meituan: {
          eyebrow: '2024.04 · 商业分析',
          title: '第四届美团商业分析精英大赛',
          rank: '卓越作品奖 · 全国前 50 强入围复赛',
          description:
            '作品《绿色引擎——新能源汽车销量增长的驱动解码与营销创新》：通过网络爬虫获取新能源车型配置、品牌影响力、区域经济与用户反馈等数据，利用多元线性回归、随机森林、LDA 主题建模与 K-means 聚类探究销量驱动因素，并引入大语言模型开发多功能数据分析与方案设计平台。',
          files: [
            { label: '汇报 PPT', name: 'PPT+0709.pdf', src: 'files/meituan-ppt.pdf' },
            { label: '研究报告', name: '绿色引擎 · 研究报告.pdf', src: 'files/meituan-report.pdf' },
          ],
        },
        cumcm: {
          eyebrow: '2023.09 · 数学建模',
          title: '高教社杯全国大学生数学建模竞赛',
          rank: '四川省二等奖',
          description:
            '《基于目标优化的蔬菜类商品自动定价与补货决策》，该比赛通过回归分析，目标优化，解决分段定价以及最优补货策略的实际问题。同期另参加数学建模美赛论文，一并收录展示。',
          files: [
            { label: '国赛论文', name: '数学建模国赛.pdf', src: 'files/cumcm-national.pdf' },
            { label: '美赛论文', name: '美赛论文.pdf', src: 'files/cumcm-mcm.pdf' },
          ],
        },
        cfa: {
          eyebrow: '2023.05 · 股权研究',
          title: 'CFA Research Challenge · 南方航空研报',
          rank: '',
          description:
            '担任组长，负责财务分析部分的撰写与全英文报告整合、美化。围绕南方航空公司及其股票展开研究，涵盖财务分析、公司估值、投资逻辑与风险提醒。',
          files: [
            { label: '英文版', name: '南方航空研报 · 英文版.pdf', src: 'files/cfa-csn-v2.pdf' },
            { label: '中文版', name: '南方航空研报 · 中文版.pdf', src: 'files/cfa-csn-v1.pdf' },
          ],
        },
        statistics: {
          eyebrow: '2023.04 · 统计建模',
          title: '全国大学生统计建模大赛',
          rank: '四川省二等奖',
          description:
            '论文《机会因素对低收入状态的影响分析》：使用多元 Probit 回归与 LightGBM 测算个体低收入状态概率，构造泰尔指数衡量机会不平等系数，并以基尼系数作对比分析。负责模型构建、实证部分编程，参与论文编写。',
          files: [
            { label: '论文', name: '统计建模.pdf', src: 'files/statistics-modeling.pdf' },
          ],
        },
        zhengda: {
          eyebrow: '2023.04 · 市场调查',
          title: '正大杯全国大学生市场调查与分析大赛',
          rank: '进入国奖评选',
          description:
            '针对果茶酒行业：综合 PEST、SWOT 分析行业与企业，使用 K-means 聚类与 Logistic 回归建模消费者行为，结合 4P 与 STP 策略给出营销建议。担任组长，负责分工协调、市场现状与营销策划部分撰写，以及报告整理与排版美化。',
          files: [
            {
              id: 'report',
              label: '调研报告',
              name: '“微醺元气，焕颜一新” · 营销建议报告.pdf',
              src: 'files/zhengda-cup-report.pdf',
            },
            {
              id: 'showcase',
              label: '产品展示',
              type: 'iframe',
              src: '/drink/showcase.html',
              caption: '果茶酒订购小程序原型 · 产品展示',
            },
          ],
        },
      }

      const params = new URLSearchParams(window.location.search)
      const id = (params.get('id') || '').toLowerCase()
      const data = AWARDS[id]

      const $ = (selector) => document.querySelector(selector)

      if (!data) {
        $('#error').hidden = false
        $('#error-id').textContent = id || '(missing)'
      } else {
        $('#header-section').hidden = false
        $('#toolbar').hidden = false
        $('#viewer').hidden = false

        $('#eyebrow').textContent = data.eyebrow
        $('#title').textContent = data.title
        if (data.rank) {
          $('#rank').textContent = data.rank
          $('#rank').hidden = false
        }
        $('#description').textContent = data.description
        document.title = data.title + ' · Xin Yongchun'

        const switcher = $('#switcher')
        const frame = $('#pdf-frame')
        const openNew = $('#open-new')
        const download = $('#download')
        const caption = $('#file-caption')

        // 只有一个文件时隐藏切换按钮
        if (data.files.length <= 1) {
          switcher.style.display = 'none'
        }

        // Local paths (e.g. "files/foo.pdf", "/drink/showcase.html") must
        // survive non-ASCII segments, hence segment-wise encoding.
        const encode = (src) =>
          src.split('/').map(encodeURIComponent).join('/')

        const activate = (index) => {
          const file = data.files[index]
          const type = file.type || 'pdf'
          const encoded = encode(file.src)

          if (type === 'iframe') {
            frame.src = encoded
            frame.title = file.caption || file.label
            openNew.href = encoded
            download.hidden = true
            caption.textContent = file.caption || ''
          } else {
            const url = encoded + '#toolbar=1&navpanes=0&view=FitH'
            frame.src = url
            frame.title = 'PDF 预览'
            openNew.href = encoded
            download.hidden = false
            download.href = encoded
            download.setAttribute('download', file.name || '')
            caption.textContent = file.name ? '正在预览：' + file.name : ''
          }

          switcher.querySelectorAll('button').forEach((btn, i) => {
            btn.classList.toggle('active', i === index)
            btn.setAttribute('aria-selected', i === index ? 'true' : 'false')
          })

          // Keep the URL ?tab= param in sync so the current view is
          // shareable / refresh-safe — but only when an id is defined.
          if (file.id) {
            const url = new URL(window.location.href)
            url.searchParams.set('tab', file.id)
            window.history.replaceState(null, '', url)
          }
        }

        data.files.forEach((file, i) => {
          const btn = document.createElement('button')
          btn.type = 'button'
          btn.role = 'tab'
          btn.textContent = file.label
          btn.addEventListener('click', () => activate(i))
          switcher.appendChild(btn)
        })

        // Pick the tab requested via `?tab=<id>`, falling back to 0.
        const tabParam = (params.get('tab') || '').toLowerCase()
        const requestedIndex = tabParam
          ? data.files.findIndex(
              (f) => (f.id || '').toLowerCase() === tabParam,
            )
          : -1
        activate(requestedIndex >= 0 ? requestedIndex : 0)
      }
    </script>
  </body>
</html>
