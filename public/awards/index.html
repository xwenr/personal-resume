<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>竞赛成果 · Xin Yongchun</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --font-display: 'Instrument Serif', 'Noto Serif SC',
          'Cormorant Garamond', 'Source Han Serif SC', 'PingFang SC',
          'Songti SC', serif;
        --font-body: 'Geist', 'Inter', 'Noto Sans SC', 'PingFang SC',
          'Microsoft YaHei', system-ui, sans-serif;
        --bg: #f5f2e9;
        --fg: #3a2e2a;
        --muted-fg: #8c7d73;
        --border: rgba(58, 46, 42, 0.14);
        --border-soft: rgba(58, 46, 42, 0.08);
        --card: rgba(245, 242, 233, 0.55);
        --card-strong: rgba(245, 242, 233, 0.72);
        color-scheme: light;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font-body);
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      html,
      body,
      * {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar,
      *::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .font-display {
        font-family: var(--font-display);
        font-feature-settings: 'ss01', 'ss02';
      }
      .page {
        min-height: 100%;
        display: flex;
        flex-direction: column;
      }
      /* --- Top bar --- */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        background: rgba(245, 242, 233, 0.7);
        border-bottom: 1px solid var(--border-soft);
      }
      .topbar-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .brand {
        font-family: var(--font-display);
        font-size: 20px;
        letter-spacing: -0.02em;
      }
      .brand em {
        font-style: italic;
        color: var(--muted-fg);
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--muted-fg);
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid var(--border-soft);
        transition: background 0.3s ease, color 0.3s ease,
          border-color 0.3s ease;
      }
      .back-link:hover {
        color: var(--fg);
        background: rgba(58, 46, 42, 0.04);
        border-color: var(--border);
      }
      .back-link svg {
        width: 14px;
        height: 14px;
      }
      /* --- Header --- */
      .header {
        max-width: 1200px;
        margin: 0 auto;
        padding: 36px 24px 18px;
        width: 100%;
      }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.25em;
        font-size: 11px;
        color: var(--muted-fg);
        margin-bottom: 14px;
      }
      .title {
        font-family: var(--font-display);
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin: 0 0 10px;
      }
      .rank {
        display: inline-block;
        font-size: 13px;
        color: var(--muted-fg);
        padding: 4px 12px;
        border-radius: 999px;
        border: 1px solid var(--border-soft);
        margin-bottom: 14px;
      }
      .description {
        max-width: 820px;
        font-size: 14px;
        line-height: 1.75;
        color: var(--muted-fg);
        white-space: pre-line;
      }
      /* --- Toolbar (file switcher + actions) --- */
      .toolbar {
        max-width: 1200px;
        margin: 18px auto 0;
        padding: 0 24px;
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }
      .switcher {
        display: inline-flex;
        padding: 4px;
        border-radius: 999px;
        background: var(--card);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-soft);
      }
      .switcher button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--muted-fg);
        font: inherit;
        font-size: 13px;
        padding: 8px 16px;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.3s ease, color 0.3s ease;
      }
      .switcher button:hover {
        color: var(--fg);
      }
      .switcher button.active {
        background: var(--fg);
        color: var(--bg);
      }
      .actions {
        margin-left: auto;
        display: inline-flex;
        gap: 8px;
      }
      .action-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid var(--border-soft);
        color: var(--muted-fg);
        cursor: pointer;
        transition: background 0.3s ease, color 0.3s ease,
          border-color 0.3s ease;
        background: var(--card);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .action-btn:hover {
        color: var(--fg);
        border-color: var(--border);
      }
      .action-btn svg {
        width: 14px;
        height: 14px;
      }
      /* --- Viewer --- */
      .viewer {
        flex: 1;
        max-width: 1200px;
        width: 100%;
        margin: 20px auto 36px;
        padding: 0 24px;
        min-height: 0;
      }
      .viewer-frame {
        width: 100%;
        height: calc(100vh - 280px);
        min-height: 520px;
        border-radius: 20px;
        border: 1px solid var(--border-soft);
        background: var(--card-strong);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        overflow: hidden;
        box-shadow: 0 12px 40px rgba(58, 46, 42, 0.06);
      }
      .viewer-frame iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      .file-caption {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted-fg);
        letter-spacing: 0.04em;
      }
      /* --- Error state --- */
      .error {
        max-width: 640px;
        margin: 80px auto;
        padding: 36px;
        text-align: center;
        border-radius: 20px;
        border: 1px solid var(--border-soft);
        background: var(--card-strong);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .error h2 {
        font-family: var(--font-display);
        font-size: 26px;
        margin: 0 0 8px;
      }
      .error p {
        color: var(--muted-fg);
        font-size: 14px;
        line-height: 1.7;
      }
      @media (max-width: 720px) {
        .topbar-inner,
        .header,
        .toolbar,
        .viewer {
          padding-left: 18px;
          padding-right: 18px;
        }
        .viewer-frame {
          height: calc(100vh - 340px);
          min-height: 420px;
        }
        .actions {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="topbar-inner">
          <a class="brand" href="/">Xin Yongchun <em>· 作品</em></a>
          <a class="back-link" href="/#profile" aria-label="返回个人主页">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            <span>返回主页</span>
          </a>
        </div>
      </header>

      <section class="header" id="header-section" hidden>
        <div class="eyebrow" id="eyebrow">竞赛成果</div>
        <h1 class="title" id="title"></h1>
        <div class="rank" id="rank" hidden></div>
        <p class="description" id="description"></p>
      </section>

      <div class="toolbar" id="toolbar" hidden>
        <div class="switcher" id="switcher" role="tablist" aria-label="文件版本切换"></div>
        <div class="actions">
          <a class="action-btn" id="open-new" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>
            新窗口打开
          </a>
          <a class="action-btn" id="download" download>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v12"/><path d="M6 10l6 6 6-6"/><path d="M4 20h16"/></svg>
            下载
          </a>
        </div>
      </div>

      <main class="viewer" id="viewer" hidden>
        <div class="viewer-frame">
          <iframe id="pdf-frame" title="PDF 预览"></iframe>
        </div>
        <p class="file-caption" id="file-caption"></p>
      </main>

      <section class="error" id="error" hidden>
        <h2>未找到对应的成果</h2>
        <p>链接中的 <code id="error-id"></code> 参数没有匹配到任何条目。请返回主页重新进入，或联系作者确认。</p>
      </section>
    </div>

    <script>
      /**
       * Award 数据：key = URL 中的 ?id=xxx
       * files 顺序决定切换按钮顺序，默认展示第一个文件。
       * label 是切换按钮上的文字；name 是下方小字的文件名说明。
       */
      const AWARDS = {
        meituan: {
          eyebrow: '2024.04 — 2024.05',
          title: '第四届美团商业分析精英大赛',
          rank: '卓越作品奖，全国 50 强',
          description:
            '项目组长，主导课题生命周期管理、逻辑建模及产品原型定义。\n【项目背景】针对新能源汽车市场进行驱动因子解码，并设计 AI 赋能的个性化营销决策平台方案。\n【核心职责】项目组长，主导课题生命周期管理、逻辑建模及产品原型定义。\n1. 全周期项目管理：统筹 3 人团队分工，联络指导老师获取专业建议；制定分阶段进度表并主持周会，确保从爬虫、建模到报告产出的各节点如期保质交付。\n2. 多维需求拆解与数据治理：建立涵盖车型、品牌、区域经济、基建及用户反馈的五维分析框架；利用爬虫集成 271 种车型与 1.1 万余条非结构化用户口碑，为后续分析夯实底座。\n3. 逻辑建模与规律挖掘：通过 LDA 主题建模识别智能驾驶等 7 类诉求；运用逐步回归与随机森林量化品牌份额、补能效率等显著因子，为营销策略提供数据实证。\n4. AI 产品方案定义：基于模型结论独立完成营销平台 Figma 高保真原型设计；定义集成 LLM（大语言模型）的交互逻辑，实现从输入产品特性到自动产出个性化策略的功能闭环。',
          files: [
            { label: '汇报 PPT', name: 'PPT+0709.pdf', src: 'files/meituan-ppt.pdf' },
            { label: '研究报告', name: '绿色引擎 · 研究报告.pdf', src: 'files/meituan-report.pdf' },
          ],
        },
        cumcm: {
          eyebrow: '2023.09',
          title: '2023 年「高教社杯」全国大学生数学建模竞赛',
          rank: '四川省二等奖',
          description:
            '【项目背景】解决商超场景下的蔬菜类商品自动定价与补货决策，实现成本与收益的最优化平衡。\n【核心职责】团队组长，主导问题逻辑分析、建模路径选择及全篇论文撰写。\n1. 业务逻辑抽象与建模：针对蔬菜品类生命周期短、损耗大的特点，将复杂的销售数据抽象为回归分析模型；通过建立非线性目标优化模型，解决分段定价、最优补货总量及品类组合的实际业务难题。\n2. 高压下的决策与管理：在 72 小时的竞赛周期内，负责制定各阶段交付节点，协调组员在建模与编程间的任务分配，确保项目在高强度环境下逻辑自洽并按时提交。\n3. 高质量文档交付：全程负责 20 余页专业学术论文的撰写，涵盖模型假设、灵敏度分析及结论推广；通过精准的专业表述展现团队研究成果，最终获得省级奖项评定。',
          files: [
            { label: '国赛论文', name: '数学建模国赛.pdf', src: 'files/cumcm-national.pdf' },
            { label: '美赛论文', name: '美赛论文.pdf', src: 'files/cumcm-mcm.pdf' },
          ],
        },
        cfa: {
          eyebrow: '2023.05 — 2023.06',
          title: 'CFA Institute Research Challenge（南方航空深度研报）',
          rank: '',
          description:
            '【项目背景】针对中国南方航空（China Southern Airlines）进行全方位的证券研究分析，在波动的宏观环境下产出符合 CFA 协会标准的英文投资价值报告。\n【核心职责】项目组长，负责财务估值分析、全英报告框架构建及多维风险定价建议。\n1. 深度商业洞察与财务建模：通过搜集行业数据，利用 DCF（现金流折现）及 EV/EBITDA 等多元指标对南方航空进行估值建模，提炼出其在后疫情时代运力复苏、低成本策略及机队优化方面的核心投资逻辑。\n2. 宏观与行业风险量化：深入分析油价波动、汇率变动（RMB/USD）以及地缘政治因素对航司净利润的影响，建立风险预警模型并识别关键敏感性因子，为投资结论提供严谨的数据支撑。\n3. 全英高质量文档交付与协同：管理 5 人团队的研报产出，负责全篇英文报告的逻辑架构设计、图表美化及专业语言润色，确保复杂的量化分析结论能够以清晰的国际化商务语言呈现。',
          files: [
            { label: '英文版', name: '南方航空研报 · 英文版.pdf', src: 'files/cfa-csn-v2.pdf' },
            { label: '中文版', name: '南方航空研报 · 中文版.pdf', src: 'files/cfa-csn-v1.pdf' },
          ],
        },
        statistics: {
          eyebrow: '2023.04 — 2023.05',
          title: '2023 年全国大学生统计建模大赛',
          rank: '四川省二等奖',
          description:
            '论文量化机会因素对个体低收入概率的贡献度。负责数据清洗、算法实现及论文核心实证部分编写。\n1. 多维指标构建与量化：基于 CHIPS 数据，利用机器学习中的 LightGBM 算法测算个体处于低收入状态的概率；通过构造泰尔指数（Theil index）衡量机会不平等系数，并与基尼系数进行对比分析。\n2. 复杂统计模型实现：独立编写统计脚本，运用参数估计中的多元 Probit 回归模型识别影响低收入状态的显著机会因子（如家庭背景、城乡差异等）。\n3. 论文编写与逻辑校验：负责实证结果的图表化展示与深度解读，并参与全篇论文的逻辑架构梳理，确保统计分析结论对政策建议具有实证支撑。',
          files: [
            { label: '论文', name: '统计建模.pdf', src: 'files/statistics-modeling.pdf' },
          ],
        },
        zhengda: {
          eyebrow: '2023.03 — 2023.04',
          title: '正大杯全国大学生市调大赛',
          rank: '国奖评选',
          description:
            '团队组长，负责调研链路管理、聚类分群及全案产品原型策划。\n【项目背景】挖掘果茶酒消费潜力，为正大集团定义「养生+社交」细分赛道新品牌及线上载体。\n【核心职责】团队组长，负责调研链路管理、聚类分群及全案产品原型策划。\n1. 市场洞察与机会发现：运用 PEST & SWOT 洞察低度酒「健康化、悦己化」趋势，精准切入「益气养颜」差异化赛道，为集团开辟 18-25 岁女性细分市场。\n2. 用户分群与策略适配：通过因子分析提取维度，利用 K-means 聚类将消费者划分为主力、经济、潜在及观望型四类画像，并基于 Logistic 回归揭示购买频率的显著影响因子。\n3. 数字化载体原型设计：独立完成「焕颜」品牌小程序高保真原型画图，规划首页商城、社区论坛及产品溯源模块；设计「围炉煮茶」等仪式感场景方案，构建完整的线上线下转化闭环。\n4. 统筹决策与协调：负责校企沟通与组内任务调配，主控 40 余页全案报告的逻辑梳理与排版美化，确保调研数据严谨转化成可落地的商业建议。',
          files: [
            {
              id: 'report',
              label: '调研报告',
              name: '“微醺元气，焕颜一新” · 营销建议报告.pdf',
              src: 'files/zhengda-cup-report.pdf',
            },
            {
              id: 'showcase',
              label: '产品展示',
              type: 'iframe',
              src: '/drink/showcase.html',
              caption: '果茶酒订购小程序原型 · 产品展示',
            },
          ],
        },
      }

      const params = new URLSearchParams(window.location.search)
      const id = (params.get('id') || '').toLowerCase()
      const data = AWARDS[id]

      const $ = (selector) => document.querySelector(selector)

      if (!data) {
        $('#error').hidden = false
        $('#error-id').textContent = id || '(missing)'
      } else {
        $('#header-section').hidden = false
        $('#toolbar').hidden = false
        $('#viewer').hidden = false

        $('#eyebrow').textContent = data.eyebrow
        $('#title').textContent = data.title
        if (data.rank) {
          $('#rank').textContent = data.rank
          $('#rank').hidden = false
        }
        $('#description').textContent = data.description
        document.title = data.title + ' · Xin Yongchun'

        const switcher = $('#switcher')
        const frame = $('#pdf-frame')
        const openNew = $('#open-new')
        const download = $('#download')
        const caption = $('#file-caption')

        // 只有一个文件时隐藏切换按钮
        if (data.files.length <= 1) {
          switcher.style.display = 'none'
        }

        // Local paths (e.g. "files/foo.pdf", "/drink/showcase.html") must
        // survive non-ASCII segments, hence segment-wise encoding.
        const encode = (src) =>
          src.split('/').map(encodeURIComponent).join('/')

        const activate = (index) => {
          const file = data.files[index]
          const type = file.type || 'pdf'
          const encoded = encode(file.src)

          if (type === 'iframe') {
            frame.src = encoded
            frame.title = file.caption || file.label
            openNew.href = encoded
            download.hidden = true
            caption.textContent = file.caption || ''
          } else {
            const url = encoded + '#toolbar=1&navpanes=0&view=FitH'
            frame.src = url
            frame.title = 'PDF 预览'
            openNew.href = encoded
            download.hidden = false
            download.href = encoded
            download.setAttribute('download', file.name || '')
            caption.textContent = file.name ? '正在预览：' + file.name : ''
          }

          switcher.querySelectorAll('button').forEach((btn, i) => {
            btn.classList.toggle('active', i === index)
            btn.setAttribute('aria-selected', i === index ? 'true' : 'false')
          })

          // Keep the URL ?tab= param in sync so the current view is
          // shareable / refresh-safe — but only when an id is defined.
          if (file.id) {
            const url = new URL(window.location.href)
            url.searchParams.set('tab', file.id)
            window.history.replaceState(null, '', url)
          }
        }

        data.files.forEach((file, i) => {
          const btn = document.createElement('button')
          btn.type = 'button'
          btn.role = 'tab'
          btn.textContent = file.label
          btn.addEventListener('click', () => activate(i))
          switcher.appendChild(btn)
        })

        // Pick the tab requested via `?tab=<id>`, falling back to 0.
        const tabParam = (params.get('tab') || '').toLowerCase()
        const requestedIndex = tabParam
          ? data.files.findIndex(
              (f) => (f.id || '').toLowerCase() === tabParam,
            )
          : -1
        activate(requestedIndex >= 0 ? requestedIndex : 0)
      }
    </script>
  </body>
</html>
